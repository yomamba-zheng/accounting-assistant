server:
  port: ${PORT:8080}

spring:
  application:
    name: accounting-assistant
  # 数据库配置
  datasource:
    # PostgreSQL (Supabase 生产环境)
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:accounting_assistant}?useUnicode=true&characterEncoding=utf8&sslmode=require
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  # 禁用自动执行SQL脚本
  sql:
    init:
      mode: never

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Swagger配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志配置
logging:
  level:
    com.accounting: debug
    org.springframework.web: info
